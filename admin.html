<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sailing Acer — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #3d5a3e; --green-mid: #567a58; --green-pale: #eef3ee;
    --grey-light: #d4d4cf; --grey-mid: #6b6b68; --cream: #faf9f6;
    --white: #ffffff; --ink: #2a2a28;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Jost',sans-serif; background:var(--cream); color:var(--ink); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
  .card { background:var(--white); border:1px solid var(--grey-light); border-radius:8px; padding:2.5rem; width:100%; max-width:500px; }
  h1 { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-style:italic; color:var(--green); margin-bottom:0.25rem; }
  .subtitle { font-size:0.8rem; color:var(--grey-mid); margin-bottom:2rem; letter-spacing:0.04em; }
  .field { margin-bottom:1.25rem; }
  label { display:block; font-size:0.75rem; font-weight:500; letter-spacing:0.1em; text-transform:uppercase; color:var(--grey-mid); margin-bottom:0.4rem; }
  input[type=text], input[type=password], input[type=number] {
    width:100%; padding:0.65rem 0.9rem; border:1px solid var(--grey-light);
    border-radius:4px; font-family:'Jost',sans-serif; font-size:0.95rem;
    color:var(--ink); background:var(--cream);
  }
  input:focus { outline:none; border-color:var(--green-mid); }

  /* Country search */
  .country-search-wrap { position:relative; }
  .dropdown {
    position:absolute; top:100%; left:0; right:0;
    background:var(--white); border:1px solid var(--grey-light);
    border-top:none; border-radius:0 0 4px 4px;
    max-height:200px; overflow-y:auto; z-index:100;
    display:none;
  }
  .dropdown.open { display:block; }
  .dropdown-item {
    padding:0.55rem 0.9rem; cursor:pointer; font-size:0.9rem;
    display:flex; align-items:center; gap:0.5rem;
  }
  .dropdown-item:hover { background:var(--green-pale); }

  .countries-wrap { display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.75rem; }
  .ctag {
    background:var(--green-pale); border:1px solid var(--green-mid);
    border-radius:2px; padding:0.25rem 0.6rem; font-size:0.82rem;
    display:flex; align-items:center; gap:0.35rem;
  }
  .ctag button { background:none; border:none; cursor:pointer; color:var(--grey-mid); font-size:1rem; line-height:1; padding:0; }
  .ctag button:hover { color:var(--ink); }

  .divider { border:none; border-top:1px solid var(--grey-light); margin:1.75rem 0; }
  .btn-save { width:100%; background:var(--green); color:white; border:none; border-radius:4px; padding:0.8rem; font-family:'Jost',sans-serif; font-size:0.95rem; font-weight:500; cursor:pointer; letter-spacing:0.04em; margin-top:0.5rem; }
  .btn-save:hover { background:var(--green-mid); }
  .status { text-align:center; font-size:0.85rem; margin-top:1rem; min-height:1.2em; }
  .status.ok { color:var(--green-mid); }
  .status.err { color:#c0392b; }
  #admin-section { display:none; }
</style>
</head>
<body>
<div class="card">
  <h1>Sailing Acer</h1>
  <p class="subtitle">Admin panel · update voyage stats</p>

  <div id="login-section">
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-save" onclick="login()">Sign in</button>
    <p class="status err" id="login-status"></p>
  </div>

  <div id="admin-section">
    <div class="field">
      <label>Miles sailed (nautical miles)</label>
      <input type="number" id="miles" min="0" placeholder="e.g. 4200">
    </div>

    <div class="field">
      <label>Countries visited</label>
      <div class="country-search-wrap">
        <input type="text" id="country-search" placeholder="Search for a country…" autocomplete="off" oninput="filterCountries()" onfocus="openDropdown()" onblur="setTimeout(closeDropdown,150)">
        <div class="dropdown" id="country-dropdown"></div>
      </div>
      <div class="countries-wrap" id="countries-wrap"></div>
    </div>

    <hr class="divider">
    <button class="btn-save" onclick="saveStats()">Save changes</button>
    <p class="status" id="save-status"></p>
  </div>
</div>

let filtered = [];

function filterCountries() {
  const q = document.getElementById('country-search').value.toLowerCase().trim();
  const dropdown = document.getElementById('country-dropdown');
  if(!q) { dropdown.classList.remove('open'); return; }
  filtered = ALL_COUNTRIES.filter(c => c.name.toLowerCase().includes(q) && !countries.find(x => x.name === c.name));
  dropdown.innerHTML = filtered.length
    ? filtered.slice(0,8).map((c,i) => `<div class="dropdown-item" onclick="selectCountry(${i})">${c.flag} ${c.name}</div>`).join('')
    : '<div class="dropdown-item" style="color:var(--grey-mid)">No matches found</div>';
  dropdown.classList.add('open');
}

function openDropdown() {
  if(document.getElementById('country-search').value) filterCountries();
}
function closeDropdown() {
  document.getElementById('country-dropdown').classList.remove('open');
}

function selectCountry(i) {
  const c = filtered[i];
  if(!c) return;
  countries.push(c);
  renderCountries();
  document.getElementById('country-search').value = '';
  document.getElementById('country-dropdown').classList.remove('open');
}

function renderCountries() {
  const wrap = document.getElementById('countries-wrap');
  wrap.innerHTML = countries.map((c,i) =>
    `<div class="ctag">${c.flag} ${c.name} <button onclick="removeCountry(${i})">×</button></div>`
  ).join('');
}

function removeCountry(i) { countries.splice(i,1); renderCountries(); }

async function login() {
  const pw = document.getElementById('password').value;
  if(!pw) return;
  const statusEl = document.getElementById('login-status');
  statusEl.textContent = 'Signing in…';
  try {
    const res = await fetch(WORKER + '/stats');
    const data = await res.json();
    const test = await fetch(WORKER + '/stats', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({...data, password: pw})
    });
    if(test.status === 401) { statusEl.textContent = 'Incorrect password.'; return; }
    password = pw;
    document.getElementById('login-section').style.display = 'none';
    document.getElementById('admin-section').style.display = 'block';
    document.getElementById('miles').value = data.miles || '';
    countries = data.countries || [];
    renderCountries();
  } catch(e) {
    statusEl.textContent = 'Could not connect to server.';
  }
}

async function saveStats() {
  const status = document.getElementById('save-status');
  status.className = 'status'; status.textContent = 'Saving…';
  try {
    const res = await fetch(WORKER + '/stats', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ miles: parseInt(document.getElementById('miles').value)||0, countries, password })
    });
    if(res.ok) { status.className='status ok'; status.textContent='✓ Saved! Changes are live on the site.'; }
    else { status.className='status err'; status.textContent='Error saving. Try again.'; }
  } catch(e) {
    status.className='status err'; status.textContent='Could not connect to server.';
  }
}
